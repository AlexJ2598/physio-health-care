<div class="page">
  <div class="card">
    <div class="card-header">
      <h1>Edit Patient</h1>
      <p>Update patient information.</p>
    </div>

    <p *ngIf="isLoading">Loading patient...</p>

    <form
      *ngIf="!isLoading"
      #patientForm="ngForm"
      (ngSubmit)="updatePatient()">

      <div class="grid">
        <div class="form-group">
          <label>First Name</label>
          <input
            type="text"
            name="firstName"
            [(ngModel)]="patient.firstName"
            required>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input
            type="text"
            name="lastName"
            [(ngModel)]="patient.lastName"
            required>
        </div>

        <div class="form-group">
          <label>Birth Date</label>
          <input
            type="date"
            name="birthDate"
            [(ngModel)]="patient.birthDate"
            required>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select
            name="gender"
            [(ngModel)]="patient.gender"
            required>
            <option [ngValue]="1">Male</option>
            <option [ngValue]="2">Female</option>
          </select>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input
            type="text"
            name="phoneNumber"
            [(ngModel)]="patient.phoneNumber">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="patient.email">
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>
        <input
          type="text"
          name="address"
          [(ngModel)]="patient.address">
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea
          rows="4"
          name="notes"
          [(ngModel)]="patient.notes">
        </textarea>
      </div>

      <div class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="buttons">
        <button
          type="button"
          class="btn-secondary"
          routerLink="/patients">
          Cancel
        </button>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="patientForm.invalid || isSaving">
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>
</div>
