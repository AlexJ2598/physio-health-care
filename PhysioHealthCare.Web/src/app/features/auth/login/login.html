<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <div class="logo">PH</div>
      <div>
        <h1>PhysioHealthCare</h1>
        <p>Clinic Management System</p>
      </div>
    </div>

    <div class="welcome">
      <h2>Welcome back</h2>
      <p>Sign in to manage patients and appointments.</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="alexis@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
        />
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading || loginForm.invalid">
        {{ isLoading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
