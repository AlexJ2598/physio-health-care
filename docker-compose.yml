services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: physiohealthcare-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development" 
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PhysioHealthCareDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
      JwtSettings__Key: "THIS_IS_A_DEVELOPMENT_SECRET_KEY_FOR_PHYSIOHEALTHCARE_123456"
      JwtSettings__Issuer: "PhysioHealthCare"
      JwtSettings__Audience: "PhysioHealthCareUsers"
      JwtSettings__ExpiresInMinutes: "60"
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: physiohealthcare-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: